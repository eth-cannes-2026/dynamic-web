const G16 = Array.from({length:16}, (_,i) => i*17);
let wasm = null;

function b64ToBytes(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function hexToBytes(hex) {
  const s = hex.replace(/^0x/i,'').toLowerCase().replace(/[^0-9a-f]/g,'').slice(0,40).padEnd(40,'0');
  const b = new Uint8Array(20);
  for (let i = 0; i < 20; i++) b[i] = parseInt(s.slice(i*2,i*2+2),16);
  return b;
}

function render(val,id) {
  if (!wasm) return;
  const addr = val.trim();
  if (addr.length < 4) return;

  const exp = wasm.instance.exports;
  const mem = new Uint8Array(exp.memory.buffer);

  const addrPtr = exp.get_addr_buf();
  mem.set(hexToBytes(addr), addrPtr);

  exp.run_face();

  const outPtr = exp.get_out_buf();
  const ctx = document.getElementById(id).getContext('2d');
  const img = ctx.createImageData(64, 64);
  for (let y = 0; y < 64; y++) {
    for (let x = 0; x < 64; x++) {
      const src = y * 64 + x;
      const dst = y * 64 + (63 - x);  // flip horizontally to match Ledger display
      const v = G16[mem[outPtr + src] & 0xf];
      img.data[dst*4]=img.data[dst*4+1]=img.data[dst*4+2]=v;
      img.data[dst*4+3]=255;
    }
  }
  ctx.putImageData(img, 0, 0);
}

function dl() {
  const out = document.createElement('canvas');
  out.width=256; out.height=256;
  const ctx = out.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(document.getElementById('c'),0,0,256,256);
  const a = document.createElement('a');
  a.href=out.toDataURL('image/png'); a.download='face.png'; a.click();
}

function rnd() {
  let h='0x'; for(let i=0;i<40;i++) h+='0123456789abcdef'[Math.floor(Math.random()*16)];
  document.getElementById('addr').value=h; render(h);
}

WebAssembly.instantiate(b64ToBytes(WASM_B64), {}).then(r => {
  wasm = r;
  document.getElementById('status').textContent = 'Ready';
  const d = '0x742d35Cc6634C0532925a3b8D4C9D1881C9AA61';
  document.getElementById('addr').value = d;
  render(d);
}).catch(e => {
  document.getElementById('status').textContent = 'Error: ' + e;
  console.error(e);
});
